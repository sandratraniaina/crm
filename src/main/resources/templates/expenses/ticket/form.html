<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:insert="~{/general/head.html}"></div>
    <meta name="_csrf" content="${_csrf.token}" />
    <meta name="_csrf_header" content="${_csrf.headerName}" />
    <link rel="stylesheet" th:href="@{/css/bootstrap-wysihtml5.css}" />
    <link th:href="@{/css/style.min.css}" rel="stylesheet">
    <link th:href="@{/css/pages/inbox.css}" rel="stylesheet">
    <link th:href="@{/css/ribbon-page.css}" rel="stylesheet">
</head>

<body class="skin-blue fixed-layout">
    <div class="preloader">
        <div class="loader">
            <div class="loader__figure"></div>
            <p class="loader__label">CRM</p>
        </div>
    </div>

    <div id="main-wrapper">
        <div th:insert="~{/general/header.html}"></div>
        <div th:insert="~{/general/left-sidebar.html}"></div>

        <div class="page-wrapper">
            <div class="container-fluid">
                <div th:insert="~{/general/page-titles.html}"></div>

                <div class="row">
                    <div class="col-lg-12">
                        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                        <div class="card">
                            <div class="card-body">
                                <h4 class="card-title"
                                    th:text="${expense.id != null ? 'Edit Expense for Ticket: ' + ticket.subject : 'Create Expense for Ticket: ' + ticket.subject}">
                                </h4>
                                <div th:if="${warning == true}" class="alert alert-warning">
                                    Warning: Customer's expense threshold has been reached
                                </div>
                                <div th:if="${confirmationMessage != null}" class="alert alert-warning" th:text="${confirmationMessage}">

                                </div>
                                <form th:object="${expense}"
                                    th:action="@{/tickets/{id}/expenses/save(id=${ticket.ticketId})}" method="post">
                                    <label class="m-t-20" for="amount">Amount:</label>
                                    <div class="input-group">
                                        <input type="number" step="0.01" id="amount" th:field="*{amount}"
                                            class="form-control" required />
                                    </div>
                                    <p class="text-danger font-weight-bold" th:if="${#fields.hasErrors('amount')}"
                                        th:errors="*{amount}"></p>

                                    <label class="m-t-20" for="description">Description:</label>
                                    <div class="input-group">
                                        <textarea id="description" th:field="*{description}"
                                            class="form-control"></textarea>
                                        <span class="text-danger font-weight-bold"
                                            th:if="${#fields.hasErrors('description')}"
                                            th:errors="*{description}"></span>
                                    </div>

                                    <label class="m-t-20" for="expenseDate">Expense Date:</label>
                                    <div class="input-group">
                                        <input type="date" id="expenseDate" th:field="*{expenseDate}"
                                            class="form-control" required />
                                    </div>
                                    <p class="text-danger font-weight-bold" th:if="${#fields.hasErrors('expenseDate')}"
                                        th:errors="*{expenseDate}"></p>

                                    <!-- Hidden fields -->
                                    <input type="hidden" th:field="*{id}" />
                                    <input type="hidden" th:field="*{ticket}" th:value="${ticket.ticketId}" />

                                    <button th:if="${confirmationMessage == null}" type="submit" class="btn btn-primary m-t-20"
                                        th:text="${expense.id != null ? 'Update Expense' : 'Create Expense'}"></button>
                                    <div th:if="${confirmationMessage != null}" >
                                        <input type="hidden" name="confirm" value="true">
                                        <button type="submit" class="btn btn-danger m-t-20">Confrirm</button>
                                        <a th:href="${home + 'tickets/' + ticket.ticketId + '/expenses'}" class="btn btn-neutral m-t-20" >Cancel</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:insert="~{/general/right-sidebar.html}"></div>
            </div>
        </div>

        <div th:insert="~{/general/footer.html}"></div>
    </div>

    <script th:inline="javascript">
        var home = /*[[${home}]]*/ null;
    </script>
    <script th:src="@{/js/library/jquery-3.2.1.min.js}" type="text/javascript"></script>
    <script th:src="@{/js/library/popper.min.js}" type="text/javascript"></script>
    <script th:src="@{/js/library/bootstrap.min.js}" type="text/javascript"></script>
    <script th:src="@{/js/library/perfect-scrollbar.jquery.min.js}" type="text/javascript"></script>
    <script th:src="@{/js/library/waves.js}" type="text/javascript"></script>
    <script th:src="@{/js/library/sidebarmenu.js}" type="text/javascript"></script>
    <script th:src="@{/js/library/sticky-kit.min.js}"></script>
    <script th:src="@{/js/library/jquery.sparkline.min.js}" type="text/javascript"></script>
    <script th:src="@{/js/library/custom.min.js}" type="text/javascript"></script>
    <script th:src="@{/js/library/wysihtml5-0.3.0.js}"></script>
    <script th:src="@{/js/library/bootstrap-wysihtml5.js}"></script>
</body>

</html>
